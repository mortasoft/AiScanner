services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=secops
      - APP_PORT=5000
    depends_on:
      - db
    restart: always

  db:
    image: mariadb:10
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=secops
    volumes:
      - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data:
